name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: grtsinry43
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  CNB_REGISTRY: docker.cnb.cool
  CNB_REPO: grtsinry43/grtblog
  CNB_ACCESS_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}

jobs:
  # ── 1. Parse tag once, share outputs with downstream jobs ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.taginfo.outputs.version }}
      channel: ${{ steps.taginfo.outputs.channel }}
      stage: ${{ steps.taginfo.outputs.stage }}
      major: ${{ steps.taginfo.outputs.major }}
      minor: ${{ steps.taginfo.outputs.minor }}
      ref_name: ${{ steps.taginfo.outputs.ref_name }}
    steps:
      - name: Determine tag info
        id: taginfo
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          VERSION="${REF_NAME#v}"
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "stage=stable" >> "$GITHUB_OUTPUT"
            echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-(alpha|beta|rc)\.([0-9]+)$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "stage=${BASH_REMATCH[4]}" >> "$GITHUB_OUTPUT"
            echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported tag format: $REF_NAME" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

  # ── 2. Build each image × platform natively (no QEMU) ──
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: grtblog-server
            dockerfile: deploy/docker/server.Dockerfile
          - name: grtblog-renderer
            dockerfile: deploy/docker/web.Dockerfile
        platform:
          - os: linux/amd64
            runner: ubuntu-latest
          - os: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform.os }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.ref.name=${{ needs.prepare.outputs.ref_name }}
            org.opencontainers.image.title=${{ matrix.image.name }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
          provenance: false
          sbom: false
          outputs: type=image,"name=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image.name }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── 3. Merge per-platform digests into multi-arch manifest ──
  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - grtblog-server
          - grtblog-renderer
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ needs.prepare.outputs.channel == 'stable' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to CNB Docker Registry
        if: ${{ needs.prepare.outputs.channel == 'stable' && env.CNB_ACCESS_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: cnb
          password: ${{ env.CNB_ACCESS_TOKEN }}

      - name: Compute image tags
        id: imagetags
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          IMAGE_NAME: ${{ matrix.image }}
          MAJOR: ${{ needs.prepare.outputs.major }}
          MINOR: ${{ needs.prepare.outputs.minor }}
          STAGE: ${{ needs.prepare.outputs.stage }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          tags=()
          image_refs=("${GHCR_REGISTRY}/${GHCR_OWNER}/${IMAGE_NAME}")
          dockerhub_namespace="${DOCKERHUB_NAMESPACE:-${DOCKERHUB_USERNAME:-}}"
          if [[ "$CHANNEL" == "stable" && -n "${dockerhub_namespace}" && -n "${DOCKERHUB_USERNAME:-}" && -n "${DOCKERHUB_TOKEN:-}" ]]; then
            image_refs+=("docker.io/${dockerhub_namespace}/${IMAGE_NAME}")
          fi
          if [[ "$CHANNEL" == "stable" && -n "${CNB_ACCESS_TOKEN:-}" ]]; then
            image_refs+=("${CNB_REGISTRY}/${CNB_REPO}/${IMAGE_NAME}")
          fi

          for ref in "${image_refs[@]}"; do
            tags+=("-t" "${ref}:${VERSION}")
            if [[ "$CHANNEL" == "stable" ]]; then
              tags+=("-t" "${ref}:${MAJOR}.${MINOR}")
              tags+=("-t" "${ref}:stable")
              tags+=("-t" "${ref}:latest")
            else
              tags+=("-t" "${ref}:preview")
              tags+=("-t" "${ref}:${STAGE}")
            fi
          done

          echo "tags=${tags[*]}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list & push
        working-directory: /tmp/digests
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            ${{ steps.imagetags.outputs.tags }} \
            $(printf "${GHCR_IMAGE}@sha256:%s " *)

  # ── 4. GitHub Release (stable = release, preview = prerelease) ──
  create-github-release:
    runs-on: ubuntu-latest
    needs: [prepare, merge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release notes file
        id: releasefile
        run: |
          RELEASE_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$RELEASE_FILE" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$RELEASE_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with notes file
        if: steps.releasefile.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.releasefile.outputs.path }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.channel == 'preview' }}
          tag_name: ${{ github.ref_name }}

      - name: Publish GitHub Release with autogenerated notes
        if: steps.releasefile.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.channel == 'preview' }}
          tag_name: ${{ github.ref_name }}

  # ── 5. Sync source code to CNB.cool ──
  sync-to-cnb:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.channel == 'stable' && vars.CNB_SYNC_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: "https://cnb.cool/grtsinry43/grtblog.git"
          PLUGIN_AUTH_TYPE: "https"
          PLUGIN_USERNAME: "cnb"
          PLUGIN_PASSWORD: ${{ secrets.CNB_ACCESS_TOKEN }}
          PLUGIN_FORCE: "true"
          PLUGIN_PUSH_ALL: "true"
          PLUGIN_PUSH_TAGS: "true"
