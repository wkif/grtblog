name: Cleanup Preview Images

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_OWNER: grtsinry43
  KEEP_PREVIEW_COUNT: "5"
  KEEP_STABLE_PATCHES_PER_MINOR: "2"
  UNTAGGED_MIN_AGE_DAYS: "3"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - grtblog-server
          - grtblog-renderer

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cleanup plan
        env:
          PACKAGE_NAME: ${{ matrix.package }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = process.env.GHCR_OWNER;
            const packageName = process.env.PACKAGE_NAME;
            const keepPreviewCount = Number(process.env.KEEP_PREVIEW_COUNT || '5');
            const keepStablePatchesPerMinor = Number(process.env.KEEP_STABLE_PATCHES_PER_MINOR || '2');

            function parseSemverTag(tag) {
              const match = /^v?(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(String(tag || '').trim());
              if (!match) return null;
              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
                prerelease: match[4] || '',
              };
            }

            function isStableTag(tag) {
              const parsed = parseSemverTag(tag);
              return Boolean(parsed && !parsed.prerelease);
            }

            function stableMinorKey(tag) {
              const parsed = parseSemverTag(tag);
              if (!parsed || parsed.prerelease) return null;
              return `${parsed.major}.${parsed.minor}`;
            }

            function prereleaseLineKey(tag) {
              const parsed = parseSemverTag(tag);
              if (!parsed || !parsed.prerelease) return null;
              const parts = parsed.prerelease.split('.');
              const stage = parts[0] || 'preview';
              return `${parsed.major}.${parsed.minor}.${parsed.patch}-${stage}`;
            }

            function compareSemverTagDesc(a, b) {
              const pa = parseSemverTag(a);
              const pb = parseSemverTag(b);
              if (!pa || !pb) return 0;
              for (const key of ['major', 'minor', 'patch']) {
                if (pa[key] !== pb[key]) return pb[key] - pa[key];
              }
              return String(pb.prerelease).localeCompare(String(pa.prerelease), undefined, { numeric: true });
            }

            const versions = await github.paginate('GET /users/{username}/packages/container/{package_name}/versions', {
              username: owner,
              package_name: packageName,
              per_page: 100,
            });

            const previewVersions = [];
            const stableBuckets = new Map();
            const preserveIds = new Set();
            const preserveRefs = new Set();

            for (const version of versions) {
              const tags = version.metadata?.container?.tags || [];
              if (tags.length === 0) continue;

              if (tags.some((tag) => ['latest', 'stable'].includes(tag))) {
                preserveIds.add(version.id);
                tags.forEach((tag) => preserveRefs.add(`ghcr.io/${owner}/${packageName}:${tag}`));
                continue;
              }

              const stableTags = tags.filter((tag) => isStableTag(tag));
              if (stableTags.length > 0) {
                const bucketKey = stableMinorKey(stableTags[0]);
                const bucket = stableBuckets.get(bucketKey) || [];
                bucket.push({
                  id: version.id,
                  tags,
                  sortTag: stableTags[0],
                  updated_at: version.updated_at,
                });
                stableBuckets.set(bucketKey, bucket);
                continue;
              }

              const exactPreviewTags = tags.filter((tag) => prereleaseLineKey(tag));
              if (exactPreviewTags.length === 0) {
                if (tags.some((tag) => ['preview', 'beta', 'rc', 'alpha'].includes(tag))) {
                  preserveIds.add(version.id);
                  tags.forEach((tag) => preserveRefs.add(`ghcr.io/${owner}/${packageName}:${tag}`));
                  continue;
                }

                preserveIds.add(version.id);
                tags.forEach((tag) => preserveRefs.add(`ghcr.io/${owner}/${packageName}:${tag}`));
                continue;
              }

              previewVersions.push({
                id: version.id,
                tags,
                sortTag: exactPreviewTags[0],
                updated_at: version.updated_at,
              });
            }

            for (const bucket of stableBuckets.values()) {
              bucket.sort((a, b) => {
                const semverCmp = compareSemverTagDesc(a.sortTag, b.sortTag);
                if (semverCmp !== 0) return semverCmp;
                return String(b.updated_at).localeCompare(String(a.updated_at));
              });

              for (const entry of bucket.slice(0, keepStablePatchesPerMinor)) {
                preserveIds.add(entry.id);
                entry.tags.forEach((tag) => preserveRefs.add(`ghcr.io/${owner}/${packageName}:${tag}`));
              }
            }

            previewVersions.sort((a, b) => {
              const updatedCmp = String(b.updated_at).localeCompare(String(a.updated_at));
              if (updatedCmp !== 0) return updatedCmp;
              return compareSemverTagDesc(a.sortTag, b.sortTag);
            });

            for (const entry of previewVersions.slice(0, keepPreviewCount)) {
              preserveIds.add(entry.id);
              entry.tags.forEach((tag) => preserveRefs.add(`ghcr.io/${owner}/${packageName}:${tag}`));
            }

            fs.mkdirSync('.github/.tmp', { recursive: true });
            fs.writeFileSync(
              `.github/.tmp/ghcr-cleanup-${packageName}.json`,
              JSON.stringify({
                owner,
                packageName,
                keepPreviewCount,
                keepStablePatchesPerMinor,
                versions,
                preserveIds: [...preserveIds],
                preserveRefs: [...preserveRefs],
              }, null, 2),
            );

            core.info(
              `package=${packageName} total_versions=${versions.length} preserved_versions=${preserveIds.size} preserved_refs=${preserveRefs.size}`,
            );

      - name: Resolve referenced digests
        env:
          PACKAGE_NAME: ${{ matrix.package }}
        run: |
          set -euo pipefail

          plan_file=".github/.tmp/ghcr-cleanup-${PACKAGE_NAME}.json"
          refs_json=$(jq -c '.preserveRefs' "$plan_file")
          digest_file=".github/.tmp/ghcr-referenced-digests-${PACKAGE_NAME}.txt"
          : > "$digest_file"

          jq -r '.[]' <<<"$refs_json" | while IFS= read -r ref; do
            [ -n "$ref" ] || continue
            raw_json="$(docker buildx imagetools inspect --raw "$ref" 2>/dev/null || true)"
            if [ -z "$raw_json" ]; then
              echo "skip unresolved ref: $ref"
              continue
            fi

            jq -r '
              .digest? // empty,
              (.manifests[]?.digest // empty),
              (.subject?.digest // empty)
            ' <<<"$raw_json" >> "$digest_file"
          done

          sort -u "$digest_file" -o "$digest_file"

      - name: Delete old preview package versions
        env:
          PACKAGE_NAME: ${{ matrix.package }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = process.env.GHCR_OWNER;
            const packageName = process.env.PACKAGE_NAME;
            const minAgeDays = Number(process.env.UNTAGGED_MIN_AGE_DAYS || '3');
            const now = Date.now();
            const minAgeMs = minAgeDays * 24 * 60 * 60 * 1000;

            function parseSemverTag(tag) {
              const match = /^v?(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(String(tag || '').trim());
              if (!match) return null;
              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
                prerelease: match[4] || '',
              };
            }

            function isStableTag(tag) {
              const parsed = parseSemverTag(tag);
              return Boolean(parsed && !parsed.prerelease);
            }

            function prereleaseLineKey(tag) {
              const parsed = parseSemverTag(tag);
              if (!parsed || !parsed.prerelease) return null;
              const parts = parsed.prerelease.split('.');
              const stage = parts[0] || 'preview';
              return `${parsed.major}.${parsed.minor}.${parsed.patch}-${stage}`;
            }

            const plan = JSON.parse(fs.readFileSync(`.github/.tmp/ghcr-cleanup-${packageName}.json`, 'utf8'));
            const preserveIds = new Set(plan.preserveIds || []);
            const referencedDigests = new Set(
              fs.existsSync(`.github/.tmp/ghcr-referenced-digests-${packageName}.txt`)
                ? fs
                    .readFileSync(`.github/.tmp/ghcr-referenced-digests-${packageName}.txt`, 'utf8')
                    .split('\n')
                    .map((line) => line.trim())
                    .filter(Boolean)
                : [],
            );

            const deletions = plan.versions.filter((version) => {
              if (preserveIds.has(version.id)) return false;

              const tags = version.metadata?.container?.tags || [];
              if (tags.length > 0) {
                if (tags.some((tag) => prereleaseLineKey(tag))) return true;
                if (tags.some((tag) => isStableTag(tag))) return true;
                return false;
              }

              if (referencedDigests.has(String(version.name || '').trim())) {
                return false;
              }

              const updatedAt = Date.parse(version.updated_at || version.created_at || 0);
              if (!Number.isFinite(updatedAt)) return false;
              return now - updatedAt >= minAgeMs;
            });

            core.info(
              `package=${packageName} referenced_digests=${referencedDigests.size} delete_candidates=${deletions.length}`,
            );

            for (const version of deletions) {
              const tags = version.metadata?.container?.tags || [];
              core.info(
                `Deleting ${packageName} version_id=${version.id} name=${version.name} tags=${tags.join(',') || '(untagged)'}`,
              );
              await github.request('DELETE /users/{username}/packages/container/{package_name}/versions/{package_version_id}', {
                username: owner,
                package_name: packageName,
                package_version_id: version.id,
              });
            }
