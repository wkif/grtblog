name: grtblog
services:
  server:
    image: "${IMAGE_REPO_PREFIX:-}grtblog-server:${APP_VERSION:-local}"
    build:
      context: ..
      dockerfile: deploy/docker/server.Dockerfile
      args:
        APP_VERSION: "${APP_VERSION:-local}"
        BUILD_COMMIT: "${BUILD_COMMIT:-unknown}"
        VITE_APP_BASE: "${VITE_APP_BASE:-/admin/}"
        VITE_APP_NAME: "${VITE_APP_NAME:-Grtblog Admin}"
        VITE_APP_TITLE: "${VITE_APP_TITLE:-管理后台}"
        VITE_WATERMARK_CONTENT: "${VITE_WATERMARK_CONTENT:-}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api/v2}"
    container_name: grtblog-server
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      APP_PROXY_HEADER: "X-Forwarded-For"
      APP_TRUSTED_PROXY_CHECK: "true"
      APP_IP_VALIDATION: "true"
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET is required}"
      DB_DRIVER: postgres
      DB_DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-grtblog}?sslmode=disable"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "0"
      REDIS_PREFIX: "${REDIS_PREFIX:-grtblog:}"
      HTMLSNAPSHOT_BASE_URL: "http://renderer:3000"
      APP_UPDATE_CHECK_ENABLED: "${APP_UPDATE_CHECK_ENABLED:-true}"
      APP_UPDATE_CHECK_REPO: "${APP_UPDATE_CHECK_REPO:-grtsinry43/grtblog-v2}"
      APP_UPDATE_CHANNEL: "${APP_UPDATE_CHANNEL:-stable}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      renderer:
        condition: service_started
    volumes:
      - ./storage/html:/app/storage/html
      - ./storage/uploads:/app/storage/uploads
      - ./storage/geoip:/app/storage/geoip
    networks:
      - grtblog-internal
    restart: unless-stopped

  renderer:
    image: "${IMAGE_REPO_PREFIX:-}grtblog-renderer:${APP_VERSION:-local}"
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
      args:
        APP_VERSION: "${APP_VERSION:-local}"
        BUILD_COMMIT: "${BUILD_COMMIT:-unknown}"
    container_name: grtblog-renderer
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      INTERNAL_API_BASE_URL: "http://server:8080/api/v2"
    volumes:
      - ./storage/html:/assets
    networks:
      - grtblog-internal
    restart: unless-stopped

  nginx:
    image: "${NGINX_IMAGE:-${DOCKER_MIRROR:-}nginx:1.27-alpine}"
    container_name: grtblog-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./storage/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - renderer
    networks:
      - grtblog-internal
    restart: unless-stopped

  postgres:
    image: "${POSTGRES_IMAGE:-${DOCKER_MIRROR:-}postgres:17-alpine}"
    container_name: grtblog-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-grtblog}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grtblog}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grtblog-internal
    restart: unless-stopped

  redis:
    image: "${REDIS_IMAGE:-${DOCKER_MIRROR:-}redis:7-alpine}"
    container_name: grtblog-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - grtblog-internal
    restart: unless-stopped

volumes:
  postgres_data:
    name: grtblog_postgres_data
  redis_data:
    name: grtblog_redis_data

networks:
  grtblog-internal:
    name: grtblog-internal
    driver: bridge
