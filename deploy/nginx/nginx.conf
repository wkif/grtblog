worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Docker embedded DNS – re-resolve container IPs every 10s.
    # This lets nginx survive container recreations without a reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Preserve real client IP from an upstream reverse proxy when present.
    map $http_x_real_ip $client_real_ip {
        default $http_x_real_ip;
        '' $remote_addr;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 200M;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location /api/v2/ws/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        location = /api/v2/admin/ai/rewrite-content/stream {
            set $upstream_server http://grtblog-server:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_pass $upstream_server;
        }

        location = /api/v2/admin/ai/generate-summary/stream {
            set $upstream_server http://grtblog-server:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            add_header X-Accel-Buffering no;
            proxy_pass $upstream_server;
        }

        location /api/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        location /uploads/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        location /health/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        location = /feed {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^ /api/v2/public/feed break;
            proxy_pass $upstream_server;
        }

        location = /rss.xml {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^ /api/v2/public/rss.xml break;
            proxy_pass $upstream_server;
        }

        # Federation: .well-known (webfinger, nodeinfo, blog-federation)
        location /.well-known/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        # Federation: ActivityPub (actor, inbox, outbox, etc.)
        location /ap/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        # Federation: NodeInfo 2.0
        location /nodeinfo/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        # Use $http_host so :port is preserved (e.g. localhost:2333). A bare `return 301 /admin/`
        # with absolute_redirect can drop the port and break local Docker publishes.
        location = /admin {
            return 301 $scheme://$http_host/admin/;
        }

        location /admin/ {
            set $upstream_server http://grtblog-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass $upstream_server;
        }

        location / {
            try_files $uri $uri.html $uri/index.html @frontend_fallback;
        }

        location @frontend_fallback {
            set $upstream_renderer http://grtblog-renderer:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 256k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
            proxy_intercept_errors on;
            error_page 502 503 504 =404 /404.html;
            proxy_pass $upstream_renderer;
        }

        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
