services:
  collector:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      PORT: "9090"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/grtblog_telemetry?sslmode=disable"
      SETUP_TOKEN: "${SETUP_TOKEN:?Set SETUP_TOKEN in .env for first Passkey registration}"
      WEBAUTHN_RP_ID: "${WEBAUTHN_RP_ID:-localhost}"
      WEBAUTHN_RP_ORIGIN: "${WEBAUTHN_RP_ORIGIN:-http://localhost:9090}"
      GRAFANA_URL: "http://grafana:3000"
    networks:
      - public
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: grtblog_telemetry
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    # No external port — accessed only via collector reverse proxy.
    environment:
      GF_SERVER_ROOT_URL: "${WEBAUTHN_RP_ORIGIN:-http://localhost:9090}/g/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_LOG_LEVEL: "error"
      GF_AUTH_ANONYMOUS_HIDE_VERSION: "true"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true  # No external access — only reachable from collector

volumes:
  pgdata:
  grafana_data:
